{% load static %}

<!DOCTYPE>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - UAnorte</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="icon" href="https://uanorte.edu.co/web/wp-content/uploads/2023/10/Diseno_sin_titulo-removebg-preview-59x59.png" sizes="32x32" type="image/png">
        <link rel="apple-touch-icon" href="https://uanorte.edu.co/web/wp-content/uploads/2023/10/Diseno_sin_titulo-removebg-preview-59x59.png">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
        <link rel="stylesheet" href="{% static 'miapp/css/login.css' %}">
        <link rel="stylesheet" href="{% static 'miapp/css/preloader.css' %}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>

    <body>
        <div class="container">
            <div class="login-box">
            

            <div class="banner">
                <img src="../static/miapp/media/logoUAnorte.png" alt="Campus UA Norte">
            </div>

            <form id="miFormulario">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>

                <button type="submit">Iniciar Sesión</button>

                <div class="links">
                <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
            </div>
        </div>

        <script src="{% static 'miapp/js/login.js' %}"></script>
        <script src="{% static 'miapp/js/preloader.js' %}"></script>
    </body>
</html>
