{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://uanorte.edu.co/web/wp-content/uploads/2023/10/Diseno_sin_titulo-removebg-preview-59x59.png" sizes="32x32" type="image/png">
    <title>Noticias - UAnorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'miapp/css/noticias.css' %}">
    <link rel="stylesheet" href="{% static 'miapp/css/preloader.css' %}">
</head>
<body>
    {% include 'preloader.html' %}

    <section class="noticias">
        <h1 class="titulo">Noticias</h1>
        <hr class="hrTitulo">

        {% for noticia in noticias %}
        <div class="columnas">
            <div class="columnasText">
                <div>
                    <img class="iconUAnorte" src="https://uanorte.edu.co/web/wp-content/uploads/2024/10/Botones-Pagina-Web-5-e1727965264522.png" alt="Icono UAnorte">
                </div>
                
                <div>
                    <h2 class="subtitulo">{{ noticia.titulo }}</h2>
                    <hr class="hrTitulo">
                    <p class="textNoticias">{{ noticia.descripcion }}</p>
                </div>
            </div>
            <div class="imagenesNoticias">
                {% if noticia.imagen %}
                    <img class="imgNoticias" src="{{ noticia.imagen.url }}" alt="Imagen noticia">
                {% endif %}
            </div>
        </div>
        {% empty %}
        <p>No hay noticias disponibles por el momento.</p>
        {% endfor %}
    </section>

    <script src="{% static 'miapp/js/preloader.js' %}"></script>
</body>
</html>
