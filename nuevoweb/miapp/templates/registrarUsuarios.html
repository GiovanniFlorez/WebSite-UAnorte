{% load static %}

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Usuarios - UAnorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="https://uanorte.edu.co/web/wp-content/uploads/2023/10/Diseno_sin_titulo-removebg-preview-59x59.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'miapp/css/registrarUsuarios.css' %}">
    <link rel="stylesheet" href="{% static 'miapp/css/preloader.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    {% include 'preloader.html' %}

    <div class="logout-global">
      <form method="POST" action="{% url 'cerrar_sesion' %}">
        {% csrf_token %}
        <button type="submit" class="logout-btn">
          <i class="fas fa-sign-out-alt"></i> <span>Cerrar sesión</span>
        </button>
      </form>
    </div>

    <div class="registro-container">
      <div class="registro-box">
        <a href="{% url 'inicio' %}" class="logo-link">
          <img src="{% static 'miapp/media/logoUAnorte.png' %}" alt="Campus UA Norte" class="logo">
        </a>

        <h2>Registro de Usuario</h2>

        <form id="registroFormulario" method="POST">
          {% csrf_token %}

          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre completo" required>
          </div>

          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="Ingresa tu correo electrónico" required>
          </div>

          <div class="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Elige un nombre de usuario" required>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Crea una contraseña" minlength="8" required>
          </div>

          <div class="col s12" id="mostrarPasswordDiv">
            <div class="input-field">
              <label class="verPassword">
                <input type="checkbox" id="mostrarPassword">
                <span>Mostrar Contraseña</span>
              </label>
            </div>
          </div>

          <button type="submit"><span>Registrar</span></button>
        </form>
      </div>
    </div>

    <script src="{% static 'miapp/js/registrarUsuarios.js' %}"></script>
    <script src="{% static 'miapp/js/preloader.js' %}"></script>
  </body>
</html>
